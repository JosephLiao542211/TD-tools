<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Terminal</title>

  <!-- Marked.js for markdown parsing -->
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>

  <!-- Highlight.js for syntax highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <!-- Common language support -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/java.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/typescript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/go.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/rust.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/cpp.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/sql.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', 'Monaco', 'Courier New', monospace;
      background: #0d1117;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: #c9d1d9;
    }

    .terminal-container {
      width: 100%;
      max-width: 1200px;
      height: 90vh;
      background: #161b22;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #30363d;
    }

    .terminal-header {
      background: #1c2128;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #30363d;
      user-select: none;
    }

    .terminal-dots {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .dot.red { background: #ff5f56; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green { background: #27c93f; }

    .terminal-title {
      flex: 1;
      text-align: center;
      font-size: 13px;
      color: #8b949e;
      font-weight: 500;
    }

    .terminal-actions {
      display: flex;
      gap: 8px;
    }

    .terminal-action-btn {
      background: transparent;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }

    .terminal-action-btn:hover {
      background: #238636;
      border-color: #238636;
      color: white;
    }

    .terminal-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: #0d1117;
      font-size: 14px;
      line-height: 1.6;
    }

    .message-group {
      margin-bottom: 16px;
      animation: fadeIn 0.2s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .message-prompt {
      color: #58a6ff;
      font-weight: 600;
    }

    .message-prompt.user::before {
      content: '❯';
      margin-right: 6px;
      color: #58a6ff;
    }

    .message-prompt.assistant::before {
      content: '●';
      margin-right: 6px;
      color: #3fb950;
    }

    .message-time {
      color: #6e7681;
      font-size: 11px;
    }

    .message-content {
      padding-left: 20px;
      color: #c9d1d9;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message-content.user {
      color: #58a6ff;
    }

    .message-content.assistant {
      color: #c9d1d9;
    }

    /* Inline code */
    .message-content code:not(pre code) {
      background: #1c2128;
      padding: 2px 6px;
      border-radius: 3px;
      color: #f85149;
      font-size: 13px;
    }

    /* Code block container */
    .code-block-wrapper {
      position: relative;
      margin: 12px 0;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #30363d;
      background: #0d1117;
    }

    .code-block-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #161b22;
      padding: 8px 12px;
      border-bottom: 1px solid #30363d;
    }

    .code-block-language {
      font-size: 11px;
      color: #8b949e;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .code-block-actions {
      display: flex;
      gap: 6px;
    }

    .copy-button {
      background: transparent;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .copy-button:hover {
      background: #238636;
      border-color: #238636;
      color: white;
    }

    .copy-button.copied {
      background: #238636;
      border-color: #238636;
      color: white;
    }

    .copy-button svg {
      width: 12px;
      height: 12px;
      fill: currentColor;
    }

    /* Pre and code blocks */
    .code-block-wrapper pre {
      margin: 0;
      padding: 16px;
      background: #0d1117;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.5;
    }

    .code-block-wrapper pre code {
      background: transparent;
      padding: 0;
      color: #c9d1d9;
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
    }

    /* Override highlight.js background */
    .code-block-wrapper pre code.hljs {
      background: #0d1117;
      padding: 0;
    }

    /* Scrollbar for code blocks */
    .code-block-wrapper pre::-webkit-scrollbar {
      height: 8px;
    }

    .code-block-wrapper pre::-webkit-scrollbar-track {
      background: #161b22;
    }

    .code-block-wrapper pre::-webkit-scrollbar-thumb {
      background: #30363d;
      border-radius: 4px;
    }

    .code-block-wrapper pre::-webkit-scrollbar-thumb:hover {
      background: #484f58;
    }

    /* Markdown rendering */
    .message-content.rendered h1,
    .message-content.rendered h2,
    .message-content.rendered h3,
    .message-content.rendered h4 {
      color: #58a6ff;
      margin: 16px 0 8px 0;
      font-weight: 600;
    }

    .message-content.rendered h1 { font-size: 20px; border-bottom: 1px solid #21262d; padding-bottom: 8px; }
    .message-content.rendered h2 { font-size: 18px; }
    .message-content.rendered h3 { font-size: 16px; }
    .message-content.rendered h4 { font-size: 14px; }

    .message-content.rendered p {
      margin: 8px 0;
      line-height: 1.6;
    }

    .message-content.rendered ul,
    .message-content.rendered ol {
      margin: 8px 0;
      padding-left: 24px;
    }

    .message-content.rendered li {
      margin: 4px 0;
    }

    .message-content.rendered blockquote {
      border-left: 3px solid #30363d;
      padding-left: 16px;
      margin: 8px 0;
      color: #8b949e;
      font-style: italic;
    }

    .message-content.rendered table {
      border-collapse: collapse;
      margin: 12px 0;
      width: 100%;
    }

    .message-content.rendered table th,
    .message-content.rendered table td {
      border: 1px solid #30363d;
      padding: 8px 12px;
      text-align: left;
    }

    .message-content.rendered table th {
      background: #161b22;
      font-weight: 600;
      color: #58a6ff;
    }

    .message-content.rendered table tr:nth-child(even) {
      background: #0d1117;
    }

    .message-content.rendered a {
      color: #58a6ff;
      text-decoration: none;
    }

    .message-content.rendered a:hover {
      text-decoration: underline;
    }

    .message-content.rendered hr {
      border: none;
      border-top: 1px solid #21262d;
      margin: 16px 0;
    }

    .message-content.rendered strong {
      color: #58a6ff;
      font-weight: 600;
    }

    .message-content.rendered em {
      color: #8b949e;
    }

    .terminal-input-area {
      background: #161b22;
      border-top: 1px solid #30363d;
      padding: 12px 16px;
    }

    .input-line {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .input-prompt {
      color: #3fb950;
      font-weight: 600;
      font-size: 14px;
    }

    .terminal-input {
      flex: 1;
      background: transparent;
      border: none;
      color: #c9d1d9;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      padding: 8px 0;
    }

    .terminal-input::placeholder {
      color: #6e7681;
    }

    .send-button {
      background: #238636;
      border: 1px solid #238636;
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .send-button:hover:not(:disabled) {
      background: #2ea043;
      border-color: #2ea043;
      box-shadow: 0 0 8px rgba(46, 160, 67, 0.4);
    }

    .send-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .typing-indicator {
      display: inline-flex;
      gap: 4px;
      padding: 4px 8px;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      background: #3fb950;
      border-radius: 50%;
      animation: typing 1.4s infinite;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typing {
      0%, 60%, 100% {
        opacity: 0.3;
        transform: scale(0.8);
      }
      30% {
        opacity: 1;
        transform: scale(1.2);
      }
    }

    .error-line {
      color: #f85149;
      padding: 8px 12px;
      background: rgba(248, 81, 73, 0.1);
      border-left: 3px solid #f85149;
      margin: 8px 0;
      border-radius: 4px;
      font-size: 13px;
    }

    .error-line::before {
      content: '✗ ';
      font-weight: bold;
    }

    .success-line {
      color: #3fb950;
      padding: 8px 12px;
      background: rgba(63, 185, 80, 0.1);
      border-left: 3px solid #3fb950;
      margin: 8px 0;
      border-radius: 4px;
      font-size: 13px;
    }

    .success-line::before {
      content: '✓ ';
      font-weight: bold;
    }

    .comment {
      color: #6e7681;
      font-style: italic;
    }

    .system-info {
      color: #8b949e;
      font-size: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #21262d;
      margin-bottom: 12px;
    }

    .system-info-line {
      margin: 4px 0;
    }

    .label {
      color: #58a6ff;
    }

    /* Scrollbar styling */
    .terminal-body::-webkit-scrollbar {
      width: 10px;
    }

    .terminal-body::-webkit-scrollbar-track {
      background: #0d1117;
    }

    .terminal-body::-webkit-scrollbar-thumb {
      background: #30363d;
      border-radius: 5px;
    }

    .terminal-body::-webkit-scrollbar-thumb:hover {
      background: #484f58;
    }

    .cursor {
      display: inline-block;
      width: 8px;
      height: 16px;
      background: #3fb950;
      animation: blink 1s step-end infinite;
      margin-left: 2px;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    .stats-bar {
      background: #1c2128;
      border-top: 1px solid #30363d;
      padding: 6px 16px;
      font-size: 11px;
      color: #6e7681;
      display: flex;
      justify-content: space-between;
    }

    .stat-item {
      display: flex;
      gap: 4px;
    }

    .stat-label {
      color: #8b949e;
    }

    .stat-value {
      color: #58a6ff;
      font-weight: 600;
    }

    /* Storage panel */
    .storage-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      background: #238636;
      border: 1px solid #238636;
      color: white;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      z-index: 100;
      font-weight: 600;
    }
    .storage-toggle:hover { background: #2ea043; }

    .storage-panel {
      display: none;
      position: fixed;
      top: 50px;
      right: 16px;
      width: 300px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      font-size: 13px;
    }
    .storage-panel.open { display: block; }
    .storage-panel h3 { color: #58a6ff; margin-bottom: 12px; font-size: 13px; }
    .storage-section { margin-bottom: 16px; }
    .storage-section label { display: block; color: #8b949e; margin-bottom: 6px; font-size: 11px; text-transform: uppercase; }
    .storage-panel input[type="file"] { width: 100%; color: #c9d1d9; font-family: inherit; font-size: 12px; }
    .storage-panel input[type="text"] {
      width: 100%; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
      padding: 6px 10px; border-radius: 4px; font-family: inherit; font-size: 13px; outline: none;
      text-transform: uppercase; letter-spacing: 2px;
    }
    .storage-btn {
      width: 100%; background: #238636; border: none; color: white;
      padding: 8px; border-radius: 4px; font-family: inherit; font-size: 12px;
      font-weight: 600; cursor: pointer; margin-top: 6px;
    }
    .storage-btn:hover { background: #2ea043; }
    .storage-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .storage-code-display {
      background: #0d1117; border: 1px solid #3fb950; border-radius: 4px;
      padding: 10px; text-align: center; margin-top: 8px; display: none;
    }
    .storage-code-display .code { font-size: 24px; font-weight: 700; color: #3fb950; letter-spacing: 4px; }
    .storage-code-display .hint { font-size: 11px; color: #6e7681; margin-top: 4px; }
    .storage-msg { margin-top: 6px; font-size: 12px; }
    .storage-msg.error { color: #f85149; }
    .storage-msg.success { color: #3fb950; }

    /* Confluence panel */
    .confluence-toggle {
      position: fixed;
      top: 16px;
      right: 120px;
      background: #1f6feb;
      border: 1px solid #1f6feb;
      color: white;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      z-index: 100;
      font-weight: 600;
    }
    .confluence-toggle:hover { background: #388bfd; }

    .confluence-panel {
      display: none;
      position: fixed;
      top: 50px;
      right: 16px;
      width: 480px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      font-size: 13px;
      max-height: 85vh;
      overflow-y: auto;
    }
    .confluence-panel.open { display: block; }
    .confluence-panel h3 { color: #1f6feb; margin-bottom: 12px; font-size: 13px; }
    .confluence-panel label { display: block; color: #8b949e; margin-bottom: 4px; font-size: 11px; text-transform: uppercase; }
    .confluence-panel input[type="text"],
    .confluence-panel textarea {
      width: 100%; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
      padding: 6px 10px; border-radius: 4px; font-family: inherit; font-size: 12px;
      outline: none; box-sizing: border-box; margin-bottom: 10px;
    }
    .confluence-panel textarea { resize: vertical; min-height: 60px; }
    .confluence-btn {
      width: 100%; background: #1f6feb; border: none; color: white;
      padding: 8px; border-radius: 4px; font-family: inherit; font-size: 12px;
      font-weight: 600; cursor: pointer; margin-top: 2px;
    }
    .confluence-btn:hover { background: #388bfd; }
    .confluence-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .confluence-btn.secondary {
      background: #21262d; border: 1px solid #30363d; color: #8b949e; margin-top: 6px;
    }
    .confluence-btn.secondary:hover { background: #30363d; color: #c9d1d9; }
    .confluence-result {
      display: none; margin-top: 12px; border-top: 1px solid #30363d; padding-top: 12px;
    }
    .confluence-result-title { color: #58a6ff; font-size: 12px; font-weight: 600; margin-bottom: 8px; }
    .confluence-result-body {
      background: #0d1117; border: 1px solid #30363d; border-radius: 4px;
      padding: 10px; font-size: 12px; color: #c9d1d9; white-space: pre-wrap;
      max-height: 300px; overflow-y: auto; line-height: 1.5;
    }
    .confluence-copy-btn {
      width: 100%; background: #238636; border: none; color: white;
      padding: 6px; border-radius: 4px; font-family: inherit; font-size: 11px;
      font-weight: 600; cursor: pointer; margin-top: 6px;
    }
    .confluence-copy-btn:hover { background: #2ea043; }
    .confluence-msg { margin-top: 6px; font-size: 12px; }
    .confluence-msg.error { color: #f85149; }
    .confluence-msg.success { color: #3fb950; }
    .confluence-tasks-preview {
      background: #0d1117; border: 1px solid #21262d; border-radius: 4px;
      padding: 8px; margin-bottom: 10px; font-size: 11px; color: #8b949e;
      max-height: 100px; overflow-y: auto;
    }

    /* Board panel */
    .board-toggle {
      position: fixed;
      top: 16px;
      right: 240px;
      background: #6e40c9;
      border: 1px solid #6e40c9;
      color: white;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      z-index: 100;
      font-weight: 600;
    }
    .board-toggle:hover { background: #8957e5; }
    .board-panel {
      display: none;
      position: fixed;
      top: 50px;
      right: 16px;
      width: 340px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      font-size: 13px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .board-panel.open { display: block; }
    .board-panel h3 { color: #8957e5; margin-bottom: 12px; font-size: 13px; }
    .board-form { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .board-form input[type="text"] {
      background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
      padding: 6px 10px; border-radius: 4px; font-family: inherit; font-size: 12px; outline: none;
    }
    .board-form textarea {
      background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
      padding: 6px 10px; border-radius: 4px; font-family: inherit; font-size: 12px; outline: none;
      resize: vertical; min-height: 60px;
    }
    .board-post-btn {
      background: #6e40c9; border: none; color: white;
      padding: 7px; border-radius: 4px; font-family: inherit; font-size: 12px;
      font-weight: 600; cursor: pointer;
    }
    .board-post-btn:hover { background: #8957e5; }
    .board-card {
      background: #0d1117; border: 1px solid #21262d; border-radius: 6px;
      padding: 10px; margin-bottom: 8px;
    }
    .board-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .board-card-name { color: #8957e5; font-weight: 600; font-size: 12px; }
    .board-card-time { color: #6e7681; font-size: 10px; }
    .board-card-body { color: #c9d1d9; font-size: 12px; white-space: pre-wrap; word-break: break-word; }
    .board-card-actions { display: flex; gap: 6px; margin-top: 6px; }
    .board-copy-btn {
      background: #21262d; border: 1px solid #30363d; color: #8b949e;
      padding: 3px 10px; border-radius: 4px; font-family: inherit; font-size: 11px; cursor: pointer;
    }
    .board-copy-btn:hover { background: #238636; border-color: #238636; color: white; }
    .board-del-btn {
      background: transparent; border: none; color: #484f58;
      font-family: inherit; font-size: 11px; cursor: pointer; padding: 3px 6px;
    }
    .board-del-btn:hover { color: #f85149; }
    .board-empty { color: #6e7681; font-size: 12px; text-align: center; padding: 16px 0; }
    .board-clear-btn {
      width: 100%; background: transparent; border: 1px solid #30363d; color: #6e7681;
      padding: 5px; border-radius: 4px; font-family: inherit; font-size: 11px; cursor: pointer; margin-top: 4px;
    }
    .board-clear-btn:hover { border-color: #f85149; color: #f85149; }
  </style>
</head>
<body>
  <div class="terminal-container">
    <div class="terminal-header">
      <div class="terminal-dots">
        <div class="dot red"></div>
        <div class="dot yellow"></div>
        <div class="dot green"></div>
      </div>
      <div class="terminal-title">claude-terminal — session: <span id="sessionDisplay"></span></div>
      <div class="terminal-actions">
        <button class="terminal-action-btn" onclick="clearConversation()">clear</button>
      </div>
    </div>

    <div class="terminal-body" id="terminal"></div>

    <div class="stats-bar">
      <div class="stat-item">
        <span class="stat-label">messages:</span>
        <span class="stat-value" id="messageCount">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">model:</span>
        <span class="stat-value">claude-sonnet-4.5</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">status:</span>
        <span class="stat-value" id="status">ready</span>
      </div>
    </div>

    <div class="terminal-input-area">
      <div class="input-line">
        <span class="input-prompt">➜</span>
        <input
          type="text"
          class="terminal-input"
          id="commandInput"
          placeholder="type your message..."
          onkeypress="handleKeyPress(event)"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="send-button" id="sendButton" onclick="sendMessage()">
          SEND
        </button>
      </div>
    </div>
  </div>

  <!-- Board Panel -->
  <button class="board-toggle" onclick="toggleBoard()">&#128172; Board</button>
  <div class="board-panel" id="boardPanel">
    <h3>&#128172; Message Board</h3>
    <div class="board-form">
      <input type="text" id="boardName" placeholder="Your name" maxlength="40" />
      <textarea id="boardMsg" placeholder="Your message..." maxlength="1000"></textarea>
      <button class="board-post-btn" onclick="boardPost()">Post</button>
    </div>
    <div id="boardMessages"><div class="board-empty">No messages yet.</div></div>
    <button class="board-clear-btn" onclick="boardClearAll()">Clear All</button>
  </div>

  <!-- Confluence Panel -->
  <button class="confluence-toggle" onclick="toggleConfluence()">&#128196; Handover</button>
  <div class="confluence-panel" id="confluencePanel">
    <h3>&#128196; Confluence Handover Filler</h3>

    <label>Confluence Page URL</label>
    <input type="text" id="confluenceUrl"
      value="https://collaborate.td.com/spaces/CSTSFRAUD/pages/3555396744/DSAP+-+TMX-OFSI"
      placeholder="https://collaborate.td.com/spaces/.../pages/..." />

    <label>Extra Context (optional)</label>
    <textarea id="confluenceContext" placeholder="e.g. Customer called in, transaction was $2,400 on Apr 3rd, account flagged by TMX..."></textarea>

    <div id="confluenceTasksPreview" class="confluence-tasks-preview" style="display:none"></div>

    <button class="confluence-btn" id="confluenceFillBtn" onclick="confluenceFill()">
      Generate Filled Checklist
    </button>
    <button class="confluence-btn secondary" id="confluencePreviewBtn" onclick="confluencePreview()">
      Preview Page Structure (no Claude)
    </button>

    <div class="confluence-msg" id="confluenceMsg"></div>

    <div class="confluence-result" id="confluenceResult">
      <div class="confluence-result-title" id="confluenceResultTitle"></div>
      <div class="confluence-result-body" id="confluenceResultBody"></div>
      <button class="confluence-copy-btn" onclick="copyConfluenceResult()">Copy to Clipboard</button>
    </div>
  </div>

  <!-- Storage Panel -->
  <button class="storage-toggle" onclick="toggleStorage()">&#11014; Storage</button>
  <div class="storage-panel" id="storagePanel">
    <h3>⬆ Temp File Storage</h3>

    <div class="storage-section">
      <label>Upload File (expires in 24h)</label>
      <input type="file" id="storageFile" />
      <button class="storage-btn" id="uploadBtn" onclick="uploadFile()">Upload & Get Code</button>
      <div class="storage-code-display" id="codeDisplay">
        <div class="code" id="uploadCode"></div>
        <div class="hint">Share this code to download</div>
      </div>
      <div class="storage-msg" id="uploadMsg"></div>
    </div>

    <div class="storage-section">
      <label>Download by Code</label>
      <input type="text" id="downloadCode" placeholder="XXXXXX" maxlength="6" />
      <button class="storage-btn" id="downloadBtn" onclick="downloadFile()">Download</button>
      <div class="storage-msg" id="downloadMsg"></div>
    </div>
  </div>

  <script>
    // ── Confluence Panel ──────────────────────────────────────────────────────

    function toggleConfluence() {
      const panel = document.getElementById('confluencePanel');
      panel.classList.toggle('open');
      document.getElementById('storagePanel').classList.remove('open');
      document.getElementById('boardPanel').classList.remove('open');
    }

    function setConfluenceMsg(text, type) {
      const el = document.getElementById('confluenceMsg');
      el.textContent = text;
      el.className = 'confluence-msg ' + (type || '');
    }

    function showConfluenceResult(title, body) {
      document.getElementById('confluenceResultTitle').textContent = title;
      document.getElementById('confluenceResultBody').textContent = body;
      document.getElementById('confluenceResult').style.display = 'block';
    }

    function copyConfluenceResult() {
      const text = document.getElementById('confluenceResultBody').textContent;
      navigator.clipboard.writeText(text).then(() => {
        setConfluenceMsg('Copied to clipboard!', 'success');
      }).catch(() => setConfluenceMsg('Copy failed — select text manually.', 'error'));
    }

    // Fetch the Confluence page HTML directly from the browser (browser is on TD network)
    async function fetchConfluencePageFromBrowser(url) {
      console.log('[Confluence] Fetching PAT from server config...');
      const configRes = await fetch('/api/confluence/client-config');
      if (!configRes.ok) {
        const d = await configRes.json().catch(() => ({}));
        throw new Error(d.message || 'Could not load PAT from server');
      }
      const { pat } = await configRes.json();
      console.log('[Confluence] PAT loaded. Parsing page URL...');

      // Extract page ID from URL: /pages/{id}/
      const pageIdMatch = url.match(/\/pages\/(\d+)/);
      if (!pageIdMatch) throw new Error('Could not extract page ID from URL (expected /pages/{id}/)');
      const pageId = pageIdMatch[1];

      const parsed = new URL(url);
      const apiUrl = `${parsed.protocol}//${parsed.hostname}/rest/api/content/${pageId}?expand=body.storage,title,version`;
      console.log('[Confluence] Browser fetching:', apiUrl);

      const pageRes = await fetch(apiUrl, {
        headers: {
          'Authorization': `Bearer ${pat}`,
          'Accept': 'application/json',
        },
      });

      console.log('[Confluence] Confluence API status:', pageRes.status);
      if (!pageRes.ok) {
        const errText = await pageRes.text().catch(() => '');
        throw new Error(`Confluence API ${pageRes.status}: ${pageRes.statusText}. ${errText.slice(0, 200)}`);
      }

      const data = await pageRes.json();
      console.log('[Confluence] Page title:', data.title, '| HTML length:', data.body?.storage?.value?.length);
      return {
        title: data.title,
        rawHtml: data.body?.storage?.value || '',
      };
    }

    async function confluencePreview() {
      const url = document.getElementById('confluenceUrl').value.trim();
      const btn = document.getElementById('confluencePreviewBtn');
      const preview = document.getElementById('confluenceTasksPreview');

      if (!url) { setConfluenceMsg('Enter a Confluence URL first.', 'error'); return; }

      btn.disabled = true;
      btn.textContent = 'Loading...';
      setConfluenceMsg('Browser fetching Confluence page...', '');
      preview.style.display = 'none';

      try {
        const { title, rawHtml } = await fetchConfluencePageFromBrowser(url);

        setConfluenceMsg('Parsing page structure...', '');
        const res = await fetch('/api/confluence/preview', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ rawHtml, title }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Preview failed');

        const taskLines = data.tasks.length > 0
          ? data.tasks.map(t => `${t.status === 'complete' ? '[x]' : '[ ]'} ${t.body}`).join('\n')
          : '(no ac:task-list items found — page may use a different checklist format)';

        const sectionLines = data.sections.map(s => `  ${s.heading}`).join('\n') || '  (none)';

        preview.style.display = 'block';
        preview.textContent =
          `Tasks (${data.tasks.length}):\n${taskLines}\n\nSections (${data.sections.length}):\n${sectionLines}`;

        setConfluenceMsg(`Found ${data.tasks.length} tasks, ${data.sections.length} sections.`, 'success');
        showConfluenceResult('Page Summary', data.summary);
      } catch (e) {
        console.error('[Confluence] Preview error:', e);
        const msg = e.message.includes('Failed to fetch') || e.message.includes('NetworkError')
          ? 'CORS or network error fetching Confluence. Are you on TD VPN/network? Open browser console for details.'
          : 'Error: ' + e.message;
        setConfluenceMsg(msg, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Preview Page Structure (no Claude)';
      }
    }

    async function confluenceFill() {
      const url = document.getElementById('confluenceUrl').value.trim();
      const context = document.getElementById('confluenceContext').value.trim();
      const btn = document.getElementById('confluenceFillBtn');

      if (!url) { setConfluenceMsg('Enter a Confluence URL first.', 'error'); return; }

      btn.disabled = true;
      btn.textContent = 'Working...';
      document.getElementById('confluenceResult').style.display = 'none';

      try {
        setConfluenceMsg('Step 1/3: Browser fetching Confluence page...', '');
        const { title, rawHtml } = await fetchConfluencePageFromBrowser(url);

        setConfluenceMsg('Step 2/3: Parsing checklist + sending to Claude...', '');
        console.log('[Confluence] Sending rawHtml to backend. Length:', rawHtml.length);

        const res = await fetch('/api/confluence/fill', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ rawHtml, title, context }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Fill failed');

        setConfluenceMsg(`Done! ${data.tasks.length} tasks found and filled.`, 'success');
        showConfluenceResult(`Filled Checklist — ${data.title}`, data.filledReport);
      } catch (e) {
        console.error('[Confluence] Fill error:', e);
        const msg = e.message.includes('Failed to fetch') || e.message.includes('NetworkError')
          ? 'CORS or network error fetching Confluence. Are you on TD VPN/network? Open browser console for details.'
          : 'Error: ' + e.message;
        setConfluenceMsg(msg, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate Filled Checklist';
      }
    }
  </script>

  <script>
    function toggleBoard() {
      document.getElementById('boardPanel').classList.toggle('open');
      document.getElementById('storagePanel').classList.remove('open');
      document.getElementById('confluencePanel').classList.remove('open');
      if (document.getElementById('boardPanel').classList.contains('open')) boardLoad();
    }

    function boardEsc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function boardLoad() {
      const res = await fetch('/api/board');
      const msgs = await res.json();
      const el = document.getElementById('boardMessages');
      if (!msgs.length) { el.innerHTML = '<div class="board-empty">No messages yet.</div>'; return; }
      el.innerHTML = msgs.slice().reverse().map(m => `
        <div class="board-card" id="bcard-${m.id}">
          <div class="board-card-header">
            <span class="board-card-name">${boardEsc(m.name)}</span>
            <span class="board-card-time">${new Date(m.timestamp).toLocaleTimeString()}</span>
          </div>
          <div class="board-card-body">${boardEsc(m.message)}</div>
          <div class="board-card-actions">
            <button class="board-copy-btn" onclick="boardCopy(${m.id})">Copy</button>
            <button class="board-del-btn" onclick="boardDel(${m.id})">Delete</button>
          </div>
        </div>
      `).join('');
    }

    async function boardPost() {
      const name = document.getElementById('boardName').value.trim();
      const message = document.getElementById('boardMsg').value.trim();
      if (!name || !message) return;
      await fetch('/api/board', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, message })
      });
      document.getElementById('boardMsg').value = '';
      boardLoad();
    }

    async function boardDel(id) {
      await fetch('/api/board/' + id, { method: 'DELETE' });
      boardLoad();
    }

    async function boardClearAll() {
      if (!confirm('Clear all messages?')) return;
      await fetch('/api/board', { method: 'DELETE' });
      boardLoad();
    }

    async function boardCopy(id) {
      const card = document.getElementById('bcard-' + id);
      const text = card.querySelector('.board-card-body').textContent;
      await navigator.clipboard.writeText(text);
      const btn = card.querySelector('.board-copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 1500);
    }

    // Auto-refresh board when open
    setInterval(() => {
      if (document.getElementById('boardPanel').classList.contains('open')) boardLoad();
    }, 10000);

    function toggleStorage() {
      document.getElementById('storagePanel').classList.toggle('open');
      // Close confluence and board if open
      document.getElementById('confluencePanel').classList.remove('open');
      document.getElementById('boardPanel').classList.remove('open');
    }

    async function uploadFile() {
      const fileInput = document.getElementById('storageFile');
      const btn = document.getElementById('uploadBtn');
      const msg = document.getElementById('uploadMsg');
      const codeDisplay = document.getElementById('codeDisplay');

      if (!fileInput.files[0]) { msg.className = 'storage-msg error'; msg.textContent = 'Select a file first.'; return; }

      const formData = new FormData();
      formData.append('file', fileInput.files[0]);

      btn.disabled = true;
      btn.textContent = 'Uploading...';
      msg.textContent = '';
      codeDisplay.style.display = 'none';

      try {
        const res = await fetch('/api/storage/upload', { method: 'POST', body: formData });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Upload failed');
        document.getElementById('uploadCode').textContent = data.code;
        codeDisplay.style.display = 'block';
        msg.className = 'storage-msg success';
        msg.textContent = `"${data.filename}" uploaded. Expires in ${data.expiresIn}.`;
      } catch (e) {
        msg.className = 'storage-msg error';
        msg.textContent = e.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Upload & Get Code';
      }
    }

    async function downloadFile() {
      const code = document.getElementById('downloadCode').value.trim().toUpperCase();
      const btn = document.getElementById('downloadBtn');
      const msg = document.getElementById('downloadMsg');

      if (code.length !== 6) { msg.className = 'storage-msg error'; msg.textContent = 'Enter a 6-character code.'; return; }

      btn.disabled = true;
      btn.textContent = 'Downloading...';
      msg.textContent = '';

      try {
        const res = await fetch(`/api/storage/download/${code}`);
        if (!res.ok) { const d = await res.json(); throw new Error(d.error || 'Download failed'); }
        const disposition = res.headers.get('Content-Disposition') || '';
        const match = disposition.match(/filename="(.+?)"/);
        const filename = match ? match[1] : 'download';
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = filename; a.click();
        URL.revokeObjectURL(url);
        msg.className = 'storage-msg success';
        msg.textContent = `Downloaded "${filename}".`;
      } catch (e) {
        msg.className = 'storage-msg error';
        msg.textContent = e.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Download';
      }
    }
  </script>

  <script>
    // Generate a session ID for this chat session
    const sessionId = 'session_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 9);
    let isStreaming = false;
    let currentMessageElement = null;
    let messageCount = 0;

    // Configure marked.js
    marked.setOptions({
      highlight: function(code, lang) {
        if (lang && hljs.getLanguage(lang)) {
          try {
            return hljs.highlight(code, { language: lang }).value;
          } catch (err) {}
        }
        return hljs.highlightAuto(code).value;
      },
      breaks: true,
      gfm: true
    });

    // Custom renderer for code blocks
    const renderer = new marked.Renderer();
    const originalCodeRenderer = renderer.code.bind(renderer);

    renderer.code = function(code, language, isEscaped) {
      const lang = language || 'plaintext';
      const displayLang = lang.charAt(0).toUpperCase() + lang.slice(1);

      // Generate highlighted code
      let highlightedCode;
      if (lang && hljs.getLanguage(lang)) {
        highlightedCode = hljs.highlight(code, { language: lang }).value;
      } else {
        highlightedCode = hljs.highlightAuto(code).value;
      }

      // Create code block with header and copy button
      const codeId = 'code-' + Math.random().toString(36).substr(2, 9);
      return `
        <div class="code-block-wrapper">
          <div class="code-block-header">
            <span class="code-block-language">${displayLang}</span>
            <div class="code-block-actions">
              <button class="copy-button" onclick="copyCode('${codeId}', this)">
                <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
                  <path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"/>
                  <path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"/>
                </svg>
                Copy
              </button>
            </div>
          </div>
          <pre><code id="${codeId}" class="hljs language-${lang}">${highlightedCode}</code></pre>
        </div>
      `;
    };

    marked.setOptions({ renderer: renderer });

    // Copy code function
    function copyCode(codeId, button) {
      const codeElement = document.getElementById(codeId);
      const code = codeElement.textContent;

      navigator.clipboard.writeText(code).then(() => {
        // Visual feedback
        const originalHTML = button.innerHTML;
        button.classList.add('copied');
        button.innerHTML = `
          <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
            <path d="M13.78 4.22a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.22 9.28a.75.75 0 0 1 1.06-1.06L6 10.94l6.72-6.72a.75.75 0 0 1 1.06 0Z"/>
          </svg>
          Copied!
        `;

        setTimeout(() => {
          button.classList.remove('copied');
          button.innerHTML = originalHTML;
        }, 2000);
      }).catch(err => {
        console.error('Failed to copy:', err);
      });
    }

    // Render markdown content
    function renderMarkdown(content) {
      try {
        return marked.parse(content);
      } catch (error) {
        console.error('Markdown parsing error:', error);
        return content;
      }
    }

    // Initialize
    document.getElementById('sessionDisplay').textContent = sessionId.substr(0, 16) + '...';
    document.getElementById('commandInput').focus();

    function getCurrentTime() {
      const now = new Date();
      return now.toTimeString().split(' ')[0];
    }

    function handleKeyPress(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }

    function addSystemInfo() {
      const terminal = document.getElementById('terminal');
      const infoDiv = document.createElement('div');
      infoDiv.className = 'system-info';
      infoDiv.innerHTML = `
        <div class="system-info-line"><span class="label">Claude Terminal</span> v1.0.0</div>
        <div class="system-info-line"><span class="label">Model:</span> claude-sonnet-4.5-20250929</div>
        <div class="system-info-line"><span class="label">Session:</span> ${sessionId}</div>
        <div class="system-info-line comment">// Type a message to start chatting with Claude</div>
      `;
      terminal.appendChild(infoDiv);
      scrollToBottom();
    }

    function addMessage(role, content, isComplete = true) {
      const terminal = document.getElementById('terminal');
      const messageGroup = document.createElement('div');
      messageGroup.className = 'message-group';

      const header = document.createElement('div');
      header.className = 'message-header';

      const prompt = document.createElement('span');
      prompt.className = `message-prompt ${role}`;
      prompt.textContent = role === 'user' ? 'user' : 'claude';

      const time = document.createElement('span');
      time.className = 'message-time';
      time.textContent = getCurrentTime();

      header.appendChild(prompt);
      header.appendChild(time);

      const contentDiv = document.createElement('div');
      contentDiv.className = `message-content ${role}`;

      // Render markdown for assistant messages, plain text for user
      if (role === 'assistant' && isComplete) {
        contentDiv.classList.add('rendered');
        contentDiv.innerHTML = renderMarkdown(content);
      } else {
        contentDiv.textContent = content;
      }

      if (!isComplete && role === 'assistant') {
        const cursor = document.createElement('span');
        cursor.className = 'cursor';
        contentDiv.appendChild(cursor);
      }

      messageGroup.appendChild(header);
      messageGroup.appendChild(contentDiv);
      terminal.appendChild(messageGroup);

      scrollToBottom();
      messageCount++;
      updateMessageCount();

      return contentDiv;
    }

    function showTypingIndicator() {
      const terminal = document.getElementById('terminal');
      const messageGroup = document.createElement('div');
      messageGroup.className = 'message-group';
      messageGroup.id = 'typing-indicator';

      const header = document.createElement('div');
      header.className = 'message-header';

      const prompt = document.createElement('span');
      prompt.className = 'message-prompt assistant';
      prompt.textContent = 'claude';

      const time = document.createElement('span');
      time.className = 'message-time';
      time.textContent = getCurrentTime();

      header.appendChild(prompt);
      header.appendChild(time);

      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content assistant';
      contentDiv.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';

      messageGroup.appendChild(header);
      messageGroup.appendChild(contentDiv);
      terminal.appendChild(messageGroup);

      scrollToBottom();
    }

    function removeTypingIndicator() {
      const indicator = document.getElementById('typing-indicator');
      if (indicator) {
        indicator.remove();
      }
    }

    function showError(message) {
      const terminal = document.getElementById('terminal');
      const errorDiv = document.createElement('div');
      errorDiv.className = 'error-line';
      errorDiv.textContent = message;
      terminal.appendChild(errorDiv);
      scrollToBottom();

      setTimeout(() => errorDiv.remove(), 5000);
    }

    function showSuccess(message) {
      const terminal = document.getElementById('terminal');
      const successDiv = document.createElement('div');
      successDiv.className = 'success-line';
      successDiv.textContent = message;
      terminal.appendChild(successDiv);
      scrollToBottom();
    }

    function scrollToBottom() {
      const terminal = document.getElementById('terminal');
      terminal.scrollTop = terminal.scrollHeight;
    }

    function updateStatus(status) {
      document.getElementById('status').textContent = status;
    }

    function updateMessageCount() {
      document.getElementById('messageCount').textContent = messageCount;
    }

    async function sendMessage() {
      const input = document.getElementById('commandInput');
      const sendButton = document.getElementById('sendButton');
      const message = input.value.trim();

      if (!message || isStreaming) return;

      // Disable input
      input.disabled = true;
      sendButton.disabled = true;
      isStreaming = true;
      updateStatus('sending...');

      // Add user message
      addMessage('user', message);

      // Clear input
      input.value = '';

      // Show typing indicator
      showTypingIndicator();
      updateStatus('streaming...');

      try {
        const response = await fetch('/api/chat/message', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            message,
            sessionId,
          }),
        });

        removeTypingIndicator();

        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        // Handle streaming response
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let assistantMessage = '';
        currentMessageElement = null;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value);
          const lines = chunk.split('\n');

          for (const line of lines) {
            if (line.startsWith('data: ')) {
              const data = line.slice(6);

              if (data === '[DONE]') {
                break;
              }

              try {
                const parsed = JSON.parse(data);

                if (parsed.type === 'text') {
                  assistantMessage += parsed.text;

                  if (!currentMessageElement) {
                    currentMessageElement = addMessage('assistant', assistantMessage, false);
                  } else {
                    // Remove cursor if it exists
                    const cursor = currentMessageElement.querySelector('.cursor');
                    if (cursor) cursor.remove();

                    currentMessageElement.textContent = assistantMessage;

                    // Add cursor back
                    const newCursor = document.createElement('span');
                    newCursor.className = 'cursor';
                    currentMessageElement.appendChild(newCursor);
                  }

                  scrollToBottom();
                } else if (parsed.type === 'error') {
                  showError(parsed.message);
                }
              } catch (e) {
                // Ignore parsing errors for incomplete chunks
              }
            }
          }
        }

        // Remove cursor from final message and render markdown
        if (currentMessageElement) {
          const cursor = currentMessageElement.querySelector('.cursor');
          if (cursor) cursor.remove();

          // Render the complete message as markdown
          currentMessageElement.classList.add('rendered');
          currentMessageElement.innerHTML = renderMarkdown(assistantMessage);
        }

        updateStatus('ready');
      } catch (error) {
        removeTypingIndicator();
        showError('Failed to send message: ' + error.message);
        console.error('Error:', error);
        updateStatus('error');
      } finally {
        // Re-enable input
        input.disabled = false;
        sendButton.disabled = false;
        isStreaming = false;
        currentMessageElement = null;
        input.focus();
        updateStatus('ready');
      }
    }

    function clearConversation() {
      const terminal = document.getElementById('terminal');
      terminal.innerHTML = '';
      messageCount = 0;
      updateMessageCount();

      addSystemInfo();
      showSuccess('Conversation cleared');

      // Call API to clear server-side conversation
      fetch(`/api/chat/conversation/${sessionId}`, {
        method: 'DELETE',
      }).catch(error => {
        console.error('Error clearing conversation:', error);
      });
    }

    // Initialize terminal
    window.addEventListener('load', () => {
      addSystemInfo();
      const terminal = document.getElementById('terminal');
      const welcomeGroup = document.createElement('div');
      welcomeGroup.className = 'message-group';
      welcomeGroup.innerHTML = `
        <div class="message-header">
          <span class="message-prompt assistant">claude</span>
          <span class="message-time">${getCurrentTime()}</span>
        </div>
        <div class="message-content assistant rendered">${renderMarkdown("Hello! I'm Claude, your coding assistant. I can help you with:\n\n- Writing and debugging code\n- Explaining programming concepts\n- Code reviews and optimization\n- Architecture and design decisions\n\nWhat would you like to work on today?")}</div>
      `;
      terminal.appendChild(welcomeGroup);
      messageCount = 1;
      updateMessageCount();
    });
  </script>
</body>
</html>
